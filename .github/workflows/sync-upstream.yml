name: Sync with upstream

on:
  schedule:
    - cron: '0 6 * * *'  # tous les jours à 6h
  workflow_dispatch:       # déclenchement manuel possible

# Nécessaire pour que GITHUB_TOKEN puisse pousser sur main/dev.
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Identité requise pour les commits de merge (upstream TikTok-Api étant
      # très actif, les merges ne sont quasiment jamais en fast-forward).
      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream → main
        run: |
          git remote add upstream https://github.com/davidteather/TikTok-Api.git
          git fetch upstream

          git checkout main
          git merge upstream/main --no-edit
          git push origin main

      - name: Sync upstream → dev
        run: |
          git checkout dev
          git merge upstream/main --no-edit
          git push origin dev
